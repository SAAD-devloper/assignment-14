       <img src="image12.jpg" alt="Restaurant Front" width="100%">
    <h1>Contact & Order Form</h1>
    
    <form action="#">
        <table cellpadding="5">
            <tr>
                <td><label for="name">Naam:</label></td>
                <td><input type="text" id="name" name="name" required></td>
            </tr>
            <tr>
                <td><label for="phone">Phone Number:</label></td>
                <td><input type="tel" id="phone" name="phone" required></td>
            </tr>
            <tr>
                <td><label for="item">Select Item:</label></td>
                <td>
                    <select id="item" name="item">
                        <option value="biryani">Matka Biryani</option>
                        <option value="burger">Crispy Burger</option>
                        <option value="cake">Pineapple Ice Cake</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="msg">Message / Address:</label></td>
                <td><textarea id="msg" name="msg" rows="4" cols="30"></textarea></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Clear Form">
                </td>
            </tr>
        </table>
    </form>

</body>
